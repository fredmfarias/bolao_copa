name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint backend
        run: pnpm --filter @bolao/backend lint

      - name: Lint frontend
        run: pnpm --filter @bolao/frontend lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @bolao/backend test
        env:
          DATABASE_URL: postgresql://bolao:secret@localhost:5432/bolao_trovao
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-jwt-secret-at-least-32-characters
          JWT_REFRESH_SECRET: ci-jwt-refresh-secret-at-least-32-characters
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 30d
          APP_URL: http://localhost:3000
          PORT: 3001

  build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: false
          tags: bolao-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: false
          tags: bolao-frontend:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bolao
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: bolao_trovao_e2e
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U bolao" --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
      mailpit:
        image: axllent/mailpit:latest
        ports: ['8025:8025', '1025:1025']
    env:
      DATABASE_URL: postgresql://bolao:secret@localhost:5432/bolao_trovao_e2e
      REDIS_URL: redis://localhost:6379/3
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      JWT_SECRET: e2e-jwt-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: e2e-refresh-secret-at-least-32-characters-long
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      APP_URL: http://localhost:3100
      PORT: '3101'
      FRONTEND_PORT: '3100'
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3101
      SMTP_HOST: localhost
      SMTP_PORT: '1025'
      SMTP_FROM: Bolão Trovão <noreply@bolao.local>
      MAILPIT_URL: http://localhost:8025
      E2E_BASE_URL: http://localhost:3100
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm --filter @bolao/shared build
      - name: Generate Prisma client
        run: pnpm --filter @bolao/backend exec prisma generate
      - name: Install Playwright browser
        run: pnpm --filter @bolao/e2e exec playwright install --with-deps chromium
      - name: Run E2E tests
        run: pnpm --filter @bolao/e2e test
      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
