# Stack local com hot-reload — docker compose -f docker-compose.dev.yml up
#
# Primeiro uso (ou ao adicionar/remover pacotes):
#   docker compose -f docker-compose.dev.yml build
#
# Uso diário (sem rebuild):
#   docker compose -f docker-compose.dev.yml up
#
# Acesso:
#   Frontend:  http://localhost:3000
#   Backend:   http://localhost:3001
#   Mailpit:   http://localhost:8025
#
# Salvar alterações → F5 no browser já reflete a mudança.
# Se alterar packages/shared, reinicie o serviço backend:
#   docker compose -f docker-compose.dev.yml restart backend

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bolao_trovao
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d bolao_trovao"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    command: >
      sh -c "pnpm --filter @bolao/shared build &&
             pnpm --filter @bolao/backend exec prisma generate &&
             pnpm --filter @bolao/backend db:deploy &&
             pnpm --filter @bolao/backend dev"
    environment:
      DATABASE_URL: postgresql://bolao:secret@postgres:5432/bolao_trovao
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-local-jwt-secret-change-in-production-min32}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-refresh-secret-change-in-production}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3001/auth/google/callback}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: ${SMTP_FROM:-Bolão Trovão <noreply@bolao.local>}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_MAILTO: ${VAPID_MAILTO:-mailto:admin@bolao.local}
      APP_URL: ${APP_URL:-http://localhost:3000}
      PORT: 3001
      NODE_ENV: development
      # Necessário no Docker/Windows para que o NestJS detecte mudanças via polling
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - backend_nm:/app/node_modules
      - backend_app_nm:/app/apps/backend/node_modules
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.dev
    command: pnpm --filter @bolao/frontend dev
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NODE_ENV: development
      # Necessário no Docker/WSL2 para que o Next.js detecte mudanças via polling
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - frontend_nm:/app/node_modules
      - frontend_app_nm:/app/apps/frontend/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_nm:
  backend_app_nm:
  frontend_nm:
  frontend_app_nm:
