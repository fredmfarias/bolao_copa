# Ambiente de desenvolvimento local — apenas serviços de infra.
# Backend e frontend rodam localmente via: pnpm dev
#
# Uso:
#   docker compose up -d
#   cp .env.example apps/backend/.env   # preencha as vars
#   cp .env.example apps/frontend/.env.local
#   pnpm dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bolao_trovao
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d bolao_trovao"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
